<html>
 <head>
  <title>
   Event Management System - Product View
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
 </head>
 <body class="bg-gray-100 text-gray-900 font-sans">
  <div class="container mx-auto p-4">
   <!-- Header -->
   <div class="flex justify-between items-center border-b pb-4 mb-4">
    <div class="flex items-center space-x-2">
     <img alt="Event Management System Logo" class="w-8 h-8" height="30" src="https://storage.googleapis.com/a1aa/image/SuhhduSBUOrcA1tJQeIWAGKeq20YGEupzakq2mdK4m5oOZHUA.jpg" width="30"/>
     <input class="border rounded p-2" placeholder="Search Events" type="text"/>
    </div>
    <div class="flex items-center space-x-4">
     <button class="border rounded p-2">
      Sign up
     </button>
     <i class="fas fa-shopping-cart text-2xl">
     </i>
    </div>
   </div>
   <!-- Main Content -->
   <div class="flex flex-col lg:flex-row">
    <!-- Event Image and Details -->
    <div class="lg:w-2/3 p-4 border rounded mb-4 lg:mb-0 bg-white shadow">
     <div class="flex items-center space-x-4">
      <img alt="Event Image" class="w-24 h-24" height="100" src="https://storage.googleapis.com/a1aa/image/F4B8yL0fOx1Gci9qruMErzMHaxT1bFcdgczKlRZbo3gTnsDKA.jpg" width="100"/>
      <div>
       <h2 class="text-xl font-bold">
        The Grand Music Concert 2023
       </h2>
       <div class="flex items-center space-x-2">
        <span class="text-lg font-bold">
         4.8
        </span>
        <div class="flex text-yellow-500">
         <i class="fas fa-star">
         </i>
         <i class="fas fa-star">
         </i>
         <i class="fas fa-star">
         </i>
         <i class="fas fa-star">
         </i>
         <i class="fas fa-star-half-alt">
         </i>
        </div>
       </div>
       <div class="text-red-500 text-lg font-bold">
        -20% ₹2000
       </div>
       <div class="text-gray-500 line-through">
        M.R.P: ₹2500
       </div>
       <div class="mt-2">
        <button class="border rounded p-2">
         Event Details
        </button>
        <button class="border rounded p-2">
         About Organizer
        </button>
       </div>
      </div>
     </div>
    </div>
    <!-- Event Purchase Options -->
    <div class="lg:w-1/3 p-4 border rounded bg-white shadow">
     <div class="text-lg font-bold">
      ₹2000
     </div>
     <div class="text-green-500">
      FREE entry for early birds
     </div>
     <div class="text-green-500">
      In stock
     </div>
     <div class="mt-2">
      <label class="block" for="quantity">
       Quantity:
      </label>
      <select class="border rounded p-2" id="quantity">
       <option>
        1
       </option>
       <option>
        2
       </option>
       <option>
        3
       </option>
       <option>
        4
       </option>
       <option>
        5
       </option>
      </select>
     </div>
     <div class="mt-4">
      <button class="bg-blue-500 text-white rounded p-2 w-full">
       Add to Cart
      </button>
      <button class="bg-yellow-500 text-white rounded p-2 w-full mt-2">
       Buy Now
      </button>
     </div>
    </div>
   </div>
   <!-- Related Events -->
   <div class="mt-4 grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="border rounded p-4 text-center bg-white shadow">
     <img alt="Related Event 1" class="mx-auto mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/vTrz1rBubsoJKJG9CBgqpJfoWdhKaSjzK7IWGQdJmwiWnsDKA.jpg" width="50"/>
     <div>
      Price: ₹1500
     </div>
     <button class="border rounded p-2 mt-2">
      ADD TO CART
     </button>
    </div>
    <div class="border rounded p-4 text-center bg-white shadow">
     <img alt="Related Event 2" class="mx-auto mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/yAp4crnow6YwEV76vmmoFwfWdPk4AyejX8m9ayTowtUpOZHUA.jpg" width="50"/>
     <div>
      Price: ₹1800
     </div>
     <button class="border rounded p-2 mt-2">
      ADD TO CART
     </button>
    </div>
    <div class="border rounded p-4 text-center bg-white shadow">
     <img alt="Related Event 3" class="mx-auto mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/TRCDHUSDwZ4hOt5LvTLqZ5oLbqenC5foL4jGbdhhGN1sOZHUA.jpg" width="50"/>
     <div>
      Price: ₹1200
     </div>
     <button class="border rounded p-2 mt-2">
      ADD TO CART
     </button>
    </div>
    <div class="border rounded p-4 text-center bg-white shadow">
     <img alt="Related Event 4" class="mx-auto mb-2" height="50" src="https://storage.googleapis.com/a1aa/image/lyvIk4wu1TqzKBsPTbqW99g2qsI8zwTpHZZsPycXeNTVnsDKA.jpg" width="50"/>
     <div>
      Price: ₹2000
     </div>
     <button class="border rounded p-2 mt-2">
      ADD TO CART
     </button>
    </div>
   </div>
  </div>
  <!-- Footer -->
  <div class="mt-4 p-4 border-t bg-white shadow">
   <div class="text-center">
    Footer
   </div>
  </div>
 </body>
</html>

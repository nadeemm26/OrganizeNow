<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merchant Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .sidebar {
      height: 100vh;
      position: fixed;
    }
    .main-content {
      margin-left: 200px;
      padding: 20px;
    }
    @media (max-width: 768px) {
      .sidebar {
        position: relative;
        height: auto;
      }
      .main-content {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-2 bg-light sidebar">
        <div class="position-sticky">
          <h4 class="text-center py-3">Merchant Panel</h4>
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="loadPage('dashboard')">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="loadPage('events')">Manage Events</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="loadPage('sales')">Sales Reports</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="loadPage('users')">User Management</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" onclick="loadPage('settings')">Settings</a>
            </li>
          </ul>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="col-md-10 offset-md-2 main-content">
        <div id="content">
          <h1>Welcome to the Merchant Dashboard</h1>
          <p>Select an option from the menu to get started.</p>
        </div>
      </main>
    </div>
  </div>

  <script>
    function loadPage(page) {
      const content = document.getElementById('content');
      switch (page) {
        case 'dashboard':
          content.innerHTML = `
            <h1>Dashboard</h1>
            <p>View your performance metrics here.</p>
            <button class="btn btn-primary">View Details</button>
          `;
          break;
        case 'events':
          content.innerHTML = `
            <h1>Manage Events</h1>
            <button class="btn btn-success">Add Event</button>
            <button class="btn btn-info">View All Events</button>
          `;
          break;
        case 'sales':
          content.innerHTML = `
            <h1>Sales Reports</h1>
            <button class="btn btn-primary">Download Report</button>
          `;
          break;
        case 'users':
          content.innerHTML = `
            <h1>User Management</h1>
            <button class="btn btn-danger">Manage Users</button>
          `;
          break;
        case 'settings':
          content.innerHTML = `
            <h1>Settings</h1>
            <button class="btn btn-warning">Update Profile</button>
          `;
          break;
        default:
          content.innerHTML = '<h1>404 - Page not found</h1>';
      }
    }
  </script>
</body>
</html>

<form action="submit_event.php" method="POST">
    <label for="event_name">Event Name:</label>
    <input type="text" name="event_name" id="event_name" required>
  
    <label for="event_category">Event Category:</label>
    <select name="event_category" id="event_category" required>
      <option value="wedding">Wedding</option>
      <option value="engagement">Engagement</option>
      <option value="anniversary">Anniversary</option>
      <option value="birthday">Birthday</option>
      <option value="other">Other Events</option>
    </select>
  
    <label for="event_date">Event Date:</label>
    <input type="date" name="event_date" id="event_date" required>
  
    <label for="event_description">Event Description:</label>
    <textarea name="event_description" id="event_description" required></textarea>
  
    <label for="services">Services Offered:</label>
    <div>
      <input type="checkbox" id="venue" name="services[]" value="venue">
      <label for="venue">Venue Booking</label>
  
      <input type="checkbox" id="catering" name="services[]" value="catering">
      <label for="catering">Catering Service</label>
  
      <input type="checkbox" id="photography" name="services[]" value="photography">
      <label for="photography">Photography</label>
  
      <input type="checkbox" id="decoration" name="services[]" value="decoration">
      <label for="decoration">Decoration</label>
  
      <input type="checkbox" id="entertainment" name="services[]" value="entertainment">
      <label for="entertainment">Entertainment</label>
    </div>
  
    <div id="service_details"></div> <!-- For dynamic service details -->
  
    <button type="submit">Submit Event</button>
  </form>
  
  <script>
    // JavaScript to dynamically show service price and details fields
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const serviceDetails = document.getElementById('service_details');
  
    checkboxes.forEach(checkbox => {
      checkbox.addEventListener('change', function() {
        if (this.checked) {
          let serviceField = document.createElement('div');
          serviceField.innerHTML = `
            <label for="${this.value}_price">${this.value.charAt(0).toUpperCase() + this.value.slice(1)} Price:</label>
            <input type="text" name="${this.value}_price" id="${this.value}_price">
            <label for="${this.value}_details">${this.value.charAt(0).toUpperCase() + this.value.slice(1)} Details:</label>
            <textarea name="${this.value}_details" id="${this.value}_details"></textarea>
          `;
          serviceDetails.appendChild(serviceField);
        } else {
          document.querySelectorAll(`#${this.value}_price, #${this.value}_details`).forEach(field => field.parentElement.remove());
        }
      });
    });
  </script>

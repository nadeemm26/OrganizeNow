<html>
<head>
    <title>Event Booking System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
            font-weight: bold;
        }
        input, textarea, select {
            margin-top: 5px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        textarea {
            resize: vertical;
        }
        button {
            margin-top: 20px;
            padding: 15px;
            font-size: 18px;
            color: #fff;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Event Booking Form</h1>
        <form>
            <label for="eventTitle">Event Title</label>
            <input type="text" id="eventTitle" name="eventTitle" placeholder="Enter the event title" required>

            <label for="eventDescription">Event Description</label>
            <textarea id="eventDescription" name="eventDescription" rows="5" placeholder="Enter a detailed overview of the event" required></textarea>

            <label for="eventDate">Event Date</label>
            <input type="date" id="eventDate" name="eventDate" required>

            <label for="eventTime">Event Time</label>
            <input type="time" id="eventTime" name="eventTime" required>

            <label for="eventLocation">Location</label>
            <input type="text" id="eventLocation" name="eventLocation" placeholder="Enter the event location" required>

            <label for="eventOrganizer">Event Organizer</label>
            <input type="text" id="eventOrganizer" name="eventOrganizer" placeholder="Enter the organizer's name" required>

            <label for="eventCategory">Event Category</label>
            <select id="eventCategory" name="eventCategory" required>
                <option value="conference">Conference</option>
                <option value="concert">Concert</option>
                <option value="webinar">Webinar</option>
                <option value="workshop">Workshop</option>
            </select>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard - My Events</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css"> <!-- External CSS -->
</head>
<body>
    <div class="container mt-4">
        <h2 class="text-center">All My Events</h2>
        <div class="d-flex justify-content-between mb-3">
            <button class="btn btn-primary">Add New Event</button>
            <button class="btn btn-secondary">View All Events</button>
        </div>

        <div class="event-grid">
            <!-- Example Event Card -->
            <div class="event-card">
                <img src="marchant/uploads/1738270544_DSC_0021.JPG" alt="Birthday Party">
                <div class="event-details">
                    <h5>Birthday Party</h5>
                    <p>This is a birthday party</p>
                    <p><strong>Price:</strong> ₹5000</p>
                    <p><strong>Location:</strong> Gandhinagar</p>
                    <p><strong>Date:</strong> 2025-02-02</p>
                    <div class="btn-group">
                        <button class="btn btn-edit">Edit</button>
                        <button class="btn btn-delete">Delete</button>
                    </div>
                </div>
            </div>

            <div class="event-card">
                <img src="marchant/uploads/1738270448_DSC_0070.JPG" alt="Wedding">
                <div class="event-details">
                    <h5>Wedding</h5>
                    <p>Traditional wedding event</p>
                    <p><strong>Price:</strong> ₹46568</p>
                    <p><strong>Location:</strong> Gandhinagar</p>
                    <p><strong>Date:</strong> 2164-07-04</p>
                    <div class="btn-group">
                        <button class="btn btn-edit">Edit</button>
                        <button class="btn btn-delete">Delete</button>
                    </div>
                </div>
            </div>

            <!-- Add more event cards dynamically using PHP -->
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
